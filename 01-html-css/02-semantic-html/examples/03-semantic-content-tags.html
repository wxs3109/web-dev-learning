<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Semantic example using figure, time, mark, and address for clearer meaning and better accessibility.">
    <title>Semantic Content Tags</title>
</head>
<body>

    <!--
        Semantic tags provide meaning, not just layout.
        Better meaning helps assistive technology and search engines understand content.
    -->

    <header>
        <h1>Community Workshop</h1>
        <p>Learn practical semantic HTML for real projects.</p>
    </header>

    <main>
        <article>
            <h2>Workshop Details</h2>
            <p>
                Date: <time datetime="2026-04-18T10:00">April 18, 2026 at 10:00 AM</time>
            </p>
            <p>
                Seats are limited, so <mark>early registration is recommended</mark>.
            </p>

            <figure>
                <img src="https://via.placeholder.com/560x280" alt="Students attending an HTML workshop">
                <figcaption>Participants practicing semantic page structure.</figcaption>
            </figure>
        </article>
    </main>

    <footer>
        <address>
            Front-End Learning Hub<br>
            88 Web Street<br>
            Vancouver, BC<br>
            <a href="mailto:hello@example.com">hello@example.com</a>
        </address>
    </footer>

</body>
</html>
